##############################################
# Buffer Formats
##############################################

# Scene color buffer - alpha channel carries the lava mask written by gbuffers_terrain
colortex0Format = RGBA8

# Bloom buffer - higher precision reduces banding from blur accumulation
colortex1Format = RGBA16F

# Terrain rain mask buffer - red = upward wettable floor, green = vertical wall mask
colortex2Format = RGBA8

##############################################
# Shadows
##############################################

shadowMapResolution = 2048
shadowDistance = 96.0


##############################################
# Shader Options Screen
##############################################

screen = MOOD
screen.MOOD = EXPOSURE CONTRAST SATURATION LIGHTING_STRENGTH TORCH_LIGHT_INTENSITY RAIN_REFLECTION_INTENSITY BLOOM_INTENSITY BLOOM_THRESHOLD FOG_DENSITY FOG_START VIGNETTE_OUTER

sliders = EXPOSURE CONTRAST SATURATION LIGHTING_STRENGTH TORCH_LIGHT_INTENSITY RAIN_REFLECTION_INTENSITY BLOOM_INTENSITY BLOOM_THRESHOLD FOG_DENSITY FOG_START VIGNETTE_OUTER
