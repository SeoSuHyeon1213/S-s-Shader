##############################################
# Buffer Formats
##############################################

# Scene color buffer - material masks are stored separately in colortex2
colortex0Format = RGBA8

# Bloom buffer - higher precision reduces banding from blur accumulation
colortex1Format = RGBA16F

# Terrain material mask buffer - red = upward wettable floor, green = vertical wall, blue = lava, alpha = water
colortex2Format = RGBA8

# World normal buffer - rgb = encoded world normal, alpha = valid scene normal mask
colortex3Format = RGBA16F

##############################################
# Shadows
##############################################

shadowMapResolution = 2048
shadowDistance = 96.0


##############################################
# Shader Options Screen
##############################################

screen = MOOD
screen.MOOD = SHADOW_MODE EXPOSURE CONTRAST SATURATION LIGHTING_STRENGTH DAY_LIGHT_STRENGTH NIGHT_LIGHT_STRENGTH SUNSET_GLOW_STRENGTH TORCH_LIGHT_INTENSITY CONTACT_SHADOW_INTENSITY RAIN_REFLECTION_INTENSITY BLOOM_INTENSITY BLOOM_THRESHOLD FOG_DENSITY FOG_START VIGNETTE_OUTER

sliders = EXPOSURE CONTRAST SATURATION LIGHTING_STRENGTH DAY_LIGHT_STRENGTH NIGHT_LIGHT_STRENGTH SUNSET_GLOW_STRENGTH TORCH_LIGHT_INTENSITY CONTACT_SHADOW_INTENSITY RAIN_REFLECTION_INTENSITY BLOOM_INTENSITY BLOOM_THRESHOLD FOG_DENSITY FOG_START VIGNETTE_OUTER
